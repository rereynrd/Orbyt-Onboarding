<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Orbyt Onboarding — Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #07090f; color: #f5f7fb; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  ::selection { background: rgba(59, 130, 246, 0.4); color: white; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="orbyt-shared.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
<script type="text/babel" src="variation-b.jsx"></script>
<script type="text/babel" src="variation-c.jsx"></script>
<script type="text/babel" src="post-onboarding.jsx"></script>
<script type="text/babel" src="archetypes.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ============== TWEAKABLE DEFAULTS ==============
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 220,
  "motionMul": 1,
  "serifFont": "Instrument Serif",
  "sansFont": "Inter",
  "bgStyle": "particles",
  "dark": true,
  "questionSet": "default"
}/*EDITMODE-END*/;

// Alt question sets
const QUESTION_SETS = {
  default: window.DEFAULT_QUESTIONS,
  quick: window.DEFAULT_QUESTIONS.slice(0, 4),
  deeper: [
    ...window.DEFAULT_QUESTIONS,
    {
      id: "fear", type: "choice", orb: "thinking",
      bubbles: ["One more — what's the fear that lives under the deadlines?"],
      options: [
        { v: "falling", label: "Falling behind", icon: "🌊" },
        { v: "notenough", label: "Not being smart enough", icon: "🫠" },
        { v: "failing", label: "Actually failing", icon: "💥" },
        { v: "disappoint", label: "Disappointing someone", icon: "😔" },
        { v: "wasting", label: "Wasting time", icon: "⏳" },
        { v: "nothing", label: "Nothing scares me 😎", icon: "🦾" },
      ],
    },
  ],
};

function OrbytShowcase() {
  const [tweaks, setTweaks] = window.useTweaks(TWEAK_DEFAULTS);
  const [panelOpen, setPanelOpen] = useState(false);

  useEffect(() => {
    const handleMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setPanelOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setPanelOpen(false);
    };
    window.addEventListener("message", handleMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handleMsg);
  }, []);

  // Apply global tweaks
  useEffect(() => {
    document.documentElement.style.setProperty("--orbyt-accent-hue", tweaks.accentHue);
    document.documentElement.style.setProperty("--orbyt-serif", `'${tweaks.serifFont}', serif`);
    document.documentElement.style.setProperty("--orbyt-sans", `'${tweaks.sansFont}', system-ui, sans-serif`);
    document.body.style.fontFamily = `'${tweaks.sansFont}', system-ui, sans-serif`;
  }, [tweaks]);

  const questions = QUESTION_SETS[tweaks.questionSet] || QUESTION_SETS.default;

  const { DesignCanvas, DCSection, DCArtboard } = window.DesignCanvas ? window : {};

  return (
    <>
      <window.DesignCanvas
        title="Orbyt Onboarding · Explorations"
        subtitle="Hi-fi prototype · 3 directions · April 2026"
        bg="#07090f"
      >
        <window.DCSection id="primary" title="Primary Direction · Split: Live Study DNA">
          <window.DCArtboard id="varC" label="Onboarding · Split DNA (themed checkmarks)" width={1100} height={720}>
            <ArtboardWrap>
              <window.VarC_SplitDNA questions={questions} />
            </ArtboardWrap>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="alts" title="Alternate Directions">
          <window.DCArtboard id="varA" label="A — Conversation Chat" width={1100} height={720}>
            <ArtboardWrap>
              <window.VarA_ConversationFlow questions={questions} motion={tweaks.motionMul} />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="varB" label="B — Cosmic / Cinematic" width={1100} height={720}>
            <ArtboardWrap>
              <window.VarB_CosmicFlow questions={questions} />
            </ArtboardWrap>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="post" title="Post-Onboarding Flow (continues Variation C)">
          <window.DCArtboard id="post-full" label="Full post-onboarding · AI → Canvas → Routines → Tour → Done" width={1100} height={720}>
            <ArtboardWrap>
              <window.PostOnboardingFlow />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="post-routines" label="Step 1 · Busy hours (Routines)" width={1100} height={720}>
            <ArtboardWrap>
              <window.PostOnboardingFlow initialStep={0} />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="post-ai" label="Step 2 · AI Connect" width={1100} height={720}>
            <ArtboardWrap>
              <window.PostOnboardingFlow initialStep={1} />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="post-canvas" label="Step 3 · Canvas Sync" width={1100} height={720}>
            <ArtboardWrap>
              <window.PostOnboardingFlow initialStep={2} />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="post-done" label="Step 4 · Launch Ready (Tour / Skip Tour)" width={1100} height={720}>
            <ArtboardWrap>
              <window.PostOnboardingFlow initialStep={3} />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="post-tour" label="Step 5 · Dashboard Tour (spotlight overlay)" width={1100} height={720}>
            <ArtboardWrap>
              <window.PostOnboardingFlow initialStep={4} />
            </ArtboardWrap>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="archetypes" title="Student DNA Archetypes · The Catalog">
          <window.DCArtboard id="archetype-gallery" label="12 Archetypes · Full gallery" width={1400} height={1900}>
            <ArtboardWrap>
              <window.ArchetypesGallery />
            </ArtboardWrap>
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="moments" title="Signature Moments (detail)">
          <window.DCArtboard id="welcome-detail" label="Welcome · Orb companion" width={720} height={520}>
            <ArtboardWrap>
              <WelcomeDetail />
            </ArtboardWrap>
          </window.DCArtboard>
          <window.DCArtboard id="dna-detail" label="Study DNA Reveal · Card" width={720} height={720}>
            <ArtboardWrap>
              <DNADetail />
            </ArtboardWrap>
          </window.DCArtboard>
        </window.DCSection>
      </window.DesignCanvas>

      {panelOpen && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection title="Theme">
            <window.TweakSlider label="Accent hue" value={tweaks.accentHue} min={180} max={360} step={5} onChange={v => setTweaks({ accentHue: v })} />
            <window.TweakToggle label="Dark mode" value={tweaks.dark} onChange={v => setTweaks({ dark: v })} />
            <window.TweakRadio label="Background" value={tweaks.bgStyle} options={[
              { value: "particles", label: "Particles" },
              { value: "stars", label: "Stars" },
              { value: "solid", label: "Solid" },
              { value: "gradient", label: "Gradient only" },
            ]} onChange={v => setTweaks({ bgStyle: v })} />
          </window.TweakSection>

          <window.TweakSection title="Typography">
            <window.TweakSelect label="Serif (headlines)" value={tweaks.serifFont} options={[
              { value: "Instrument Serif", label: "Instrument Serif" },
              { value: "Playfair Display", label: "Playfair Display" },
              { value: "Fraunces", label: "Fraunces" },
              { value: "EB Garamond", label: "EB Garamond" },
            ]} onChange={v => setTweaks({ serifFont: v })} />
            <window.TweakSelect label="Sans (UI)" value={tweaks.sansFont} options={[
              { value: "Inter", label: "Inter" },
              { value: "Geist", label: "Geist" },
              { value: "IBM Plex Sans", label: "IBM Plex Sans" },
              { value: "Manrope", label: "Manrope" },
            ]} onChange={v => setTweaks({ sansFont: v })} />
          </window.TweakSection>

          <window.TweakSection title="Motion">
            <window.TweakSlider label="Intensity" value={tweaks.motionMul} min={0.3} max={2} step={0.1} onChange={v => setTweaks({ motionMul: v })} />
          </window.TweakSection>

          <window.TweakSection title="Questions">
            <window.TweakRadio label="Set" value={tweaks.questionSet} options={[
              { value: "default", label: "Default (7)" },
              { value: "quick", label: "Quick (4)" },
              { value: "deeper", label: "Deeper (8, adds fear Q)" },
            ]} onChange={v => setTweaks({ questionSet: v })} />
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

const ArtboardWrap = ({ children }) => (
  <div style={{ width: "100%", height: "100%", background: "#07090f", borderRadius: 12, overflow: "hidden", position: "relative" }}>
    {children}
  </div>
);

// --- Signature moment: welcome detail
const WelcomeDetail = () => {
  return (
    <div style={{ width: "100%", height: "100%", background: "#0A0E1A", display: "grid", placeItems: "center", position: "relative", overflow: "hidden" }}>
      <window.ParticleField />
      <div style={{ textAlign: "center", position: "relative", zIndex: 2 }}>
        <div style={{ display: "grid", placeItems: "center", marginBottom: 20 }}>
          <window.CompanionOrb size={220} mood="happy" energy={1} />
        </div>
        <div style={{
          fontSize: 12, letterSpacing: "0.2em", color: "#60A5FA",
          textTransform: "uppercase", fontFamily: "'JetBrains Mono', monospace",
          marginBottom: 10,
        }}>Meet Orby</div>
        <div style={{
          fontFamily: "'Instrument Serif', serif", fontSize: 44,
          letterSpacing: "-0.02em", lineHeight: 1.1,
        }}>
          Your orbital companion<br/>
          <em style={{ fontStyle: "italic", color: "#A78BFA" }}>reacts to everything you say.</em>
        </div>
        <div style={{ marginTop: 20, fontSize: 14, color: "#9AA4B8", maxWidth: 440, marginLeft: "auto", marginRight: "auto", lineHeight: 1.5 }}>
          Color, rings, particles, spin speed — the orb's mood is driven by your answers and encodes your Study DNA's hue.
        </div>
      </div>
    </div>
  );
};

// --- Signature moment: DNA card close-up, cycling through states
const DNADetail = () => {
  const traits = [
    { struggle: "procrastination", peak: "night", style: "music", motivation: "streak", field: "stem", name: "Alex", goal: "proud" },
    { struggle: "overwhelm", peak: "morning", style: "alone", motivation: "mastery", field: "humanities", name: "Riley", goal: "calm" },
    { struggle: "focus", peak: "afternoon", style: "cafe", motivation: "curious", field: "arts", name: "Sam", goal: "excited" },
  ];
  const [i, setI] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setI(x => (x + 1) % traits.length), 4500);
    return () => clearInterval(t);
  }, []);
  const answers = traits[i];
  const dna = window.buildStudyDNA(answers);
  return (
    <div style={{
      width: "100%", height: "100%",
      background: `radial-gradient(ellipse at 50% 40%, oklch(0.28 0.15 ${dna.hue} / 0.6), transparent 70%), #0A0E1A`,
      display: "grid", placeItems: "center", position: "relative", overflow: "hidden",
      transition: "background 1.2s ease",
    }}>
      <window.StarField density={80} />
      <div key={i} style={{ position: "relative", zIndex: 2, animation: "swap-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)" }}>
        <window.DNACard dna={dna} answers={answers} large />
      </div>
      <div style={{
        position: "absolute", bottom: 24, left: 0, right: 0,
        textAlign: "center", fontSize: 11, color: "#5C6678",
        letterSpacing: "0.2em", textTransform: "uppercase",
        fontFamily: "'JetBrains Mono', monospace",
      }}>
        Cycling · {i + 1} / {traits.length}
      </div>
      <style>{`
        @keyframes swap-in {
          from { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(8px); }
          to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
      `}</style>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<OrbytShowcase />);
</script>
</body>
</html>
