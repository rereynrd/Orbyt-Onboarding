<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Orbyt Study DNA Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    color-scheme: dark;
  }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: "Inter", system-ui, sans-serif;
  }

  body {
    overflow: hidden;
    background:
      linear-gradient(rgba(53, 43, 34, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(53, 43, 34, 0.08) 1px, transparent 1px),
      linear-gradient(180deg, #f4efe7 0%, #ebe5db 100%);
    background-size: 120px 120px, 120px 120px, auto;
    color: #f5f7fb;
  }

  * {
    box-sizing: border-box;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  ::selection {
    background: rgba(59, 130, 246, 0.35);
    color: white;
  }

  #root {
    min-height: 100vh;
  }

  .demo-shell {
    min-height: 100vh;
    padding: clamp(12px, 3vw, 32px);
    display: grid;
    place-items: center;
  }

  .demo-stage-wrap {
    display: grid;
    place-items: center;
  }

  .demo-stage {
    width: 1100px;
    height: 720px;
    transform-origin: center center;
  }

  .demo-frame {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 20px;
    background: #0a0e1a;
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow:
      0 26px 70px rgba(16, 12, 9, 0.24),
      0 10px 24px rgba(16, 12, 9, 0.12);
  }

  @media (max-width: 720px) {
    body {
      background-size: 72px 72px, 72px 72px, auto;
    }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="orbyt-shared.jsx"></script>
<script type="text/babel" src="dna-catalog.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
<script type="text/babel" src="variation-b.jsx"></script>
<script type="text/babel" src="post-onboarding.jsx"></script>
<script type="text/babel" src="variation-c.jsx"></script>

<script type="text/babel">
const { useEffect, useState } = React;

const BASE_WIDTH = 1100;
const BASE_HEIGHT = 720;
const rootNode = document.getElementById("root");

function showBootError(error) {
  const message = error instanceof Error ? error.message : String(error);
  rootNode.innerHTML = `
    <div style="
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #1f2937;
      font-family: Inter, system-ui, sans-serif;
    ">
      <pre style="
        max-width: 960px;
        white-space: pre-wrap;
        background: rgba(255,255,255,0.72);
        color: #111827;
        border: 1px solid rgba(17,24,39,0.12);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 14px 40px rgba(17,24,39,0.12);
      ">${message}</pre>
    </div>
  `;
}

window.addEventListener("error", (event) => {
  showBootError(event.error || event.message || "Unknown boot error");
});

window.addEventListener("unhandledrejection", (event) => {
  showBootError(event.reason || "Unhandled promise rejection");
});

function useStageScale() {
  const [scale, setScale] = useState(1);

  useEffect(() => {
    const updateScale = () => {
      const horizontalPadding = window.innerWidth < 720 ? 24 : 64;
      const verticalPadding = window.innerHeight < 900 ? 24 : 64;
      const availableWidth = Math.max(window.innerWidth - horizontalPadding, 320);
      const availableHeight = Math.max(window.innerHeight - verticalPadding, 320);
      const nextScale = Math.min(availableWidth / BASE_WIDTH, availableHeight / BASE_HEIGHT, 1);
      setScale(nextScale);
    };

    updateScale();
    window.addEventListener("resize", updateScale);
    return () => window.removeEventListener("resize", updateScale);
  }, []);

  return scale;
}

function DemoApp() {
  const scale = useStageScale();

  return (
    <main className="demo-shell">
      <div
        className="demo-stage-wrap"
        style={{ width: BASE_WIDTH * scale, height: BASE_HEIGHT * scale }}
      >
        <div className="demo-stage" style={{ transform: `scale(${scale})` }}>
          <div className="demo-frame">
            <window.VarC_SplitDNA />
          </div>
        </div>
      </div>
    </main>
  );
}

function waitForDemoAssets(timeoutMs = 15000) {
  const startedAt = Date.now();

  return new Promise((resolve, reject) => {
    const check = () => {
      const isReady = Boolean(
        window.VarC_SplitDNA &&
        window.DEFAULT_QUESTIONS &&
        window.OrbytTokens &&
        window.buildStudyDNA &&
        window.PostOnboardingFlow
      );

      if (isReady) {
        resolve();
        return;
      }

      if (Date.now() - startedAt > timeoutMs) {
        reject(new Error("Study DNA demo assets did not finish loading."));
        return;
      }

      window.setTimeout(check, 50);
    };

    check();
  });
}

waitForDemoAssets()
  .then(() => {
    ReactDOM.createRoot(rootNode).render(<DemoApp />);
  })
  .catch((error) => {
    console.error(error);
    showBootError(error);
  });
</script>
</body>
</html>
